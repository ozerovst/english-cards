<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Master 1000</title>
    
    <!-- PWA Meta для iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="MyPhrases">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; } /* slate-950 */
        .perspective { perspective: 1000px; }
        .card-inner {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face {
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid #1e293b;
        }
        .card-back { transform: rotateY(180deg); }
        .highlight { color: #3b82f6; font-weight: 800; }
        
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
        
        .fade-in { animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Кастомные стили для квиза */
        .quiz-option {
            transition: all 0.2s ease;
        }
        .quiz-option.correct { background-color: #059669 !important; border-color: #10b981 !important; color: white !important; }
        .quiz-option.wrong { background-color: #dc2626 !important; border-color: #f43f5e !important; color: white !important; }
    </style>
</head>
<body class="flex flex-col min-h-screen font-sans overflow-hidden text-slate-200">

    <!-- Header & Mode Switcher -->
    <header class="pt-10 bg-slate-900/40 border-b border-slate-800 backdrop-blur-md flex flex-col shadow-lg">
        <div class="p-4 flex justify-between items-center px-6">
            <div>
                <h1 class="text-lg font-black text-white tracking-tighter italic">PATTERN MASTER</h1>
                <p id="progress-text" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mt-0.5">0 / 0</p>
            </div>
            <div class="flex gap-4">
                <button id="shuffle-btn" class="p-2 text-slate-500 active:text-blue-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18L22 6"/><path d="M2 6l20 12"/></svg>
                </button>
            </div>
        </div>

        <!-- Tab Switcher -->
        <div class="flex px-6 gap-6 border-t border-slate-800/50">
            <button id="tab-cards" class="py-3 text-xs font-black uppercase tracking-widest border-b-2 border-blue-500 text-white">Карточки</button>
            <button id="tab-quiz" class="py-3 text-xs font-black uppercase tracking-widest border-b-2 border-transparent text-slate-500">Квиз</button>
        </div>
    </header>

    <!-- Study Mode (Cards) -->
    <main id="view-cards" class="flex-grow flex items-center justify-center p-6 relative">
        <div class="perspective w-full max-w-sm aspect-[4/5] max-h-[480px]">
            <div id="card" class="card-inner relative w-full h-full shadow-2xl shadow-blue-500/5">
                <!-- Front (EN) -->
                <div class="card-face card-front absolute inset-0 bg-slate-900">
                    <p id="word-en" class="font-bold text-white leading-snug fade-in px-2"></p>
                </div>
                <!-- Back (RU) -->
                <div class="card-face card-back absolute inset-0 bg-blue-700 text-white">
                    <p id="word-ru" class="text-2xl font-semibold leading-tight fade-in px-4"></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Quiz Mode -->
    <main id="view-quiz" class="hidden flex-grow flex flex-col p-6 overflow-y-auto no-scrollbar">
        <div class="max-w-sm mx-auto w-full flex flex-col gap-6 pt-4">
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] text-center min-h-[160px] flex items-center justify-center shadow-xl">
                <p id="quiz-question" class="text-2xl font-bold text-white leading-tight"></p>
            </div>

            <div id="quiz-options" class="grid gap-3">
                <!-- Опции будут генерироваться JS -->
            </div>

            <div id="quiz-feedback" class="h-6 text-center text-sm font-bold opacity-0 transition-opacity">
                Нажмите любую кнопку, чтобы продолжить
            </div>
        </div>
    </main>

    <!-- Footer Controls (Shared / Dynamic) -->
    <footer class="p-8 pb-12 bg-slate-900/60 border-t border-slate-800 flex justify-between items-center gap-6">
        <div id="cards-controls" class="w-full flex justify-between items-center gap-6">
            <button id="prev-btn" class="w-14 h-14 flex items-center justify-center rounded-2xl bg-slate-800 text-slate-400 active:scale-90 active:bg-slate-700">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <button id="flip-btn" class="flex-grow py-5 bg-white text-slate-950 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] active:scale-95 shadow-lg">Проверить</button>
            <button id="next-btn" class="w-20 h-20 flex items-center justify-center rounded-3xl bg-blue-600 text-white shadow-xl active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>
        
        <div id="quiz-controls" class="hidden w-full text-center">
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Выберите правильный перевод</p>
        </div>
    </footer>

    <script>
        const fullVocabulary = [
            { en: "I am looking for my card.", ru: "Я ищу свою карту.", h: "looking for" },
            { en: "I am looking for my phone.", ru: "Я ищу свой телефон.", h: "looking for" },
            { en: "I am looking for my keys.", ru: "Я ищу свои ключи.", h: "looking for" },
            { en: "I am looking for a job.", ru: "Я ищу работу.", h: "looking for" },
            { en: "I am looking for a place to stay.", ru: "Я ищу жилье.", h: "looking for" },
            { en: "I am looking for a good restaurant.", ru: "Я ищу хороший ресторан.", h: "looking for" },
            { en: "I am looking for a coffee shop.", ru: "Я ищу кофейню.", h: "looking for" },
            { en: "I am looking for a taxi.", ru: "Я ищу такси.", h: "looking for" },
            { en: "I am looking at the menu.", ru: "Я смотрю в меню.", h: "looking at" },
            { en: "I am looking at the map.", ru: "Я смотрю на карту.", h: "looking at" },
            { en: "I look after my health.", ru: "Я забочусь о своем здоровье.", h: "look after" },
            { en: "She looks after the kids.", ru: "Она присматривает за детьми.", h: "looks after" },
            { en: "I am looking forward to the trip.", ru: "Я с нетерпением жду поездки.", h: "looking forward to" },
            { en: "I am looking forward to seeing you.", ru: "Я с нетерпением жду встречи с тобой.", h: "looking forward to" },
            { en: "It depends on the weather.", ru: "Это зависит от погоды.", h: "depends on" },
            { en: "It depends on the price.", ru: "Это зависит от цены.", h: "depends on" },
            { en: "I have been to Thailand.", ru: "Я был в Таиланде.", h: "have been to" },
            { en: "I have never been to Thailand.", ru: "Я никогда не был в Таиланде.", h: "never been to" },
            { en: "I decide to try this place.", ru: "Я решаю попробовать это место.", h: "decide to" },
            { en: "I plan to visit this place.", ru: "Я планирую посетить это место.", h: "plan to" },
            { en: "I try to find a good restaurant.", ru: "Я пытаюсь найти хороший ресторан.", h: "try to" },
            { en: "I try to remember the name.", ru: "Я пытаюсь вспомнить имя.", h: "try to" }
        ];

        let currentVocab = [...fullVocabulary];
        let currentIndex = parseInt(localStorage.getItem('lastCardIndex')) || 0;
        let mode = 'cards'; // 'cards' | 'quiz'
        let quizAnswered = false;

        const cardEl = document.getElementById('card');
        const wordEnEl = document.getElementById('word-en');
        const wordRuEl = document.getElementById('word-ru');
        const progressEl = document.getElementById('progress-text');
        
        // Переключатель вкладок
        const tabCards = document.getElementById('tab-cards');
        const tabQuiz = document.getElementById('tab-quiz');
        const viewCards = document.getElementById('view-cards');
        const viewQuiz = document.getElementById('view-quiz');
        const cardsControls = document.getElementById('cards-controls');
        const quizControls = document.getElementById('quiz-controls');

        function setMode(newMode) {
            mode = newMode;
            if (mode === 'cards') {
                tabCards.classList.add('border-blue-500', 'text-white');
                tabQuiz.classList.remove('border-blue-500', 'text-white');
                viewCards.classList.remove('hidden');
                viewQuiz.classList.add('hidden');
                cardsControls.classList.remove('hidden');
                quizControls.classList.add('hidden');
                updateCard();
            } else {
                tabQuiz.classList.add('border-blue-500', 'text-white');
                tabCards.classList.remove('border-blue-500', 'text-white');
                viewQuiz.classList.remove('hidden');
                viewCards.classList.add('hidden');
                quizControls.classList.remove('hidden');
                cardsControls.classList.add('hidden');
                initQuizQuestion();
            }
        }

        tabCards.addEventListener('click', () => setMode('cards'));
        tabQuiz.addEventListener('click', () => setMode('quiz'));

        function shuffle(array) {
            let a = [...array];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function highlightText(text, target) {
            if (!target) return text;
            const regex = new RegExp(`(${target})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        // --- ЛОГИКА КАРТОЧЕК ---
        function updateCard() {
            const item = currentVocab[currentIndex];
            wordEnEl.innerHTML = highlightText(item.en, item.h);
            wordRuEl.innerHTML = item.ru;
            const len = item.en.length;
            wordEnEl.style.fontSize = len > 50 ? '1.25rem' : len > 30 ? '1.75rem' : '2.25rem';
            progressEl.textContent = `${currentIndex + 1} / ${currentVocab.length}`;
            cardEl.classList.remove('is-flipped');
            localStorage.setItem('lastCardIndex', currentIndex);
        }

        // --- ЛОГИКА КВИЗА ---
        function initQuizQuestion() {
            quizAnswered = false;
            document.getElementById('quiz-feedback').style.opacity = '0';
            const correctItem = currentVocab[currentIndex];
            document.getElementById('quiz-question').textContent = correctItem.ru;
            
            // Генерируем опции
            let options = [correctItem];
            let distractors = currentVocab.filter(i => i.en !== correctItem.en);
            distractors = shuffle(distractors).slice(0, 3);
            options = shuffle([...options, ...distractors]);

            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "quiz-option w-full p-5 bg-slate-900 border border-slate-800 rounded-2xl text-left text-sm font-medium active:scale-[0.98]";
                btn.textContent = opt.en;
                btn.onclick = () => handleQuizSelection(btn, opt.en === correctItem.en);
                optionsContainer.appendChild(btn);
            });
            progressEl.textContent = `${currentIndex + 1} / ${currentVocab.length}`;
        }

        function handleQuizSelection(btn, isCorrect) {
            if (quizAnswered) {
                // Если уже ответили, нажатие на любую кнопку ведет к следующему вопросу
                currentIndex = (currentIndex + 1) % currentVocab.length;
                initQuizQuestion();
                return;
            }

            quizAnswered = true;
            if (isCorrect) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                // Подсвечиваем правильный
                Array.from(document.getElementById('quiz-options').children).forEach(b => {
                    if (b.textContent === currentVocab[currentIndex].en) b.classList.add('correct');
                });
            }
            document.getElementById('quiz-feedback').style.opacity = '1';
        }

        // Общие кнопки
        document.getElementById('next-btn').addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % currentVocab.length;
            updateCard();
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + currentVocab.length) % currentVocab.length;
            updateCard();
        });

        document.getElementById('shuffle-btn').addEventListener('click', () => {
            currentVocab = shuffle([...currentVocab]);
            currentIndex = 0;
            if (mode === 'cards') updateCard(); else initQuizQuestion();
        });

        cardEl.addEventListener('click', () => cardEl.classList.toggle('is-flipped'));
        document.getElementById('flip-btn').addEventListener('click', () => cardEl.classList.toggle('is-flipped'));

        // Старт
        updateCard();

        // Офлайн режим
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                if (location.protocol === 'https:' || location.hostname === 'localhost') {
                    const swCode = `
                        const CACHE_NAME = 'eng-patterns-v3';
                        self.addEventListener('install', (e) => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll([location.href]))));
                        self.addEventListener('fetch', (e) => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
                    `;
                    try {
                        const blob = new Blob([swCode], { type: 'application/javascript' });
                        navigator.serviceWorker.register(URL.createObjectURL(blob));
                    } catch (e) {}
                }
            });
        }
    </script>
</body>
</html>
