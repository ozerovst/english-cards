<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pattern Master</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;
background:#020617;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:16px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
font-size:18px;
margin:0;
}

#progress{
font-size:12px;
color:#60a5fa;
}

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:420px;
height:320px;
perspective:1000px;
}

.inner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform .4s;
}

.flipped{
transform:rotateY(180deg);
}

.face{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:24px;
box-sizing:border-box;
border-radius:20px;
backface-visibility:hidden;
border:1px solid #1e293b;
}

.front{
background:#0f172a;
font-size:26px;
}

.back{
background:#2563eb;
font-size:22px;
transform:rotateY(180deg);
}

footer{
padding:16px;
border-top:1px solid #1e293b;
display:flex;
gap:10px;
}

button{
flex:1;
padding:14px;
background:#1e293b;
color:white;
border:none;
border-radius:10px;
font-size:14px;
}

.primary{
background:#2563eb;
}

.quiz{
width:100%;
max-width:420px;
display:none;
flex-direction:column;
gap:10px;
}

.option{
padding:14px;
border:1px solid #1e293b;
border-radius:10px;
background:#0f172a;
}

.correct{
background:#16a34a;
}

.wrong{
background:#dc2626;
}

</style>

</head>

<body>

<header>

<h1>Pattern Master</h1>

<div id="progress"></div>

</header>

<main>

<div id="cardsView" class="card">

<div id="cardInner" class="inner">

<div id="front" class="face front"></div>

<div id="back" class="face back"></div>

</div>

</div>

<div id="quizView" class="quiz">

<div id="quizQuestion" class="face front"></div>

<div id="quizOptions"></div>

</div>

</main>

<footer>

<button id="prev">Prev</button>

<button id="flip" class="primary">Flip</button>

<button id="next">Next</button>

<button id="mode">Quiz</button>

</footer>

<script>

const phrases=[

{en:"I search for good restaurants.",ru:"Я ищу хорошие рестораны."},
{en:"I look for a cafe.",ru:"Я ищу кафе."},
{en:"I look for a quiet place.",ru:"Я ищу тихое место."},
{en:"I look for a taxi.",ru:"Я ищу такси."},
{en:"I look for a pharmacy.",ru:"Я ищу аптеку."},

{en:"It depends on the weather.",ru:"Это зависит от погоды."},
{en:"It depends on the price.",ru:"Это зависит от цены."},
{en:"It depends on the situation.",ru:"Это зависит от ситуации."},
{en:"It depends on the country.",ru:"Это зависит от страны."},
{en:"It depends on the time.",ru:"Это зависит от времени."},

{en:"I have forgotten my passport.",ru:"Я забыл паспорт."},
{en:"I have forgotten the address.",ru:"Я забыл адрес."},
{en:"I have forgotten the password.",ru:"Я забыл пароль."},

{en:"I open Google Maps and search for a cafe.",ru:"Я открываю Google Maps и ищу кафе."},
{en:"I open the app and look for restaurants.",ru:"Я открываю приложение и ищу рестораны."},

{en:"I am looking for my keys.",ru:"Я ищу свои ключи."},
{en:"I am looking for a place to stay.",ru:"Я ищу место где остановиться."},

{en:"I am waiting for the taxi.",ru:"Я жду такси."},
{en:"I am waiting for the bus.",ru:"Я жду автобус."},
{en:"I am waiting for the meeting.",ru:"Я жду встречу."},

{en:"I get home late.",ru:"Я прихожу домой поздно."},
{en:"I get home around midnight.",ru:"Я прихожу домой около полуночи."},

{en:"I get used to the weather.",ru:"Я привыкаю к погоде."},
{en:"I get used to the city.",ru:"Я привыкаю к городу."},

{en:"I have already sent the message.",ru:"Я уже отправил сообщение."},
{en:"I have already booked the hotel.",ru:"Я уже забронировал отель."},

{en:"I decide to try this place.",ru:"Я решаю попробовать это место."},
{en:"I decide to change the plan.",ru:"Я решаю изменить план."},

{en:"I plan to visit the museum.",ru:"Я планирую посетить музей."},
{en:"I plan to go to the beach.",ru:"Я планирую пойти на пляж."},

{en:"I try to find a good restaurant.",ru:"Я пытаюсь найти хороший ресторан."},
{en:"I try to understand the problem.",ru:"Я пытаюсь понять проблему."},

{en:"I return to the hotel.",ru:"Я возвращаюсь в отель."},
{en:"I return to the office.",ru:"Я возвращаюсь в офис."}

]

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[a[i],a[j]]=[a[j],a[i]]
}
return a
}

let data=shuffle([...phrases])

let index=Number(localStorage.getItem("cardIndex"))||0

const front=document.getElementById("front")
const back=document.getElementById("back")
const progress=document.getElementById("progress")
const inner=document.getElementById("cardInner")

function renderCard(){

let p=data[index]

front.textContent=p.en
back.textContent=p.ru

progress.textContent=(index+1)+" / "+data.length

inner.classList.remove("flipped")

localStorage.setItem("cardIndex",index)

}

renderCard()

flip.onclick=()=>inner.classList.toggle("flipped")

next.onclick=()=>{
index=(index+1)%data.length
renderCard()
}

prev.onclick=()=>{
index=(index-1+data.length)%data.length
renderCard()
}

let quiz=false

mode.onclick=()=>{

quiz=!quiz

if(quiz){

mode.textContent="Cards"

cardsView.style.display="none"
quizView.style.display="flex"

nextQuestion()

}

else{

mode.textContent="Quiz"

cardsView.style.display="block"
quizView.style.display="none"

renderCard()

}

}

function nextQuestion(){

let q=data[index]

quizQuestion.textContent=q.ru

let options=shuffle([
q,
...shuffle(data.filter(p=>p.en!==q.en)).slice(0,3)
])

quizOptions.innerHTML=""

options.forEach(o=>{

let btn=document.createElement("div")

btn.className="option"

btn.textContent=o.en

btn.onclick=()=>{

if(o.en===q.en){
btn.classList.add("correct")
}
else{
btn.classList.add("wrong")
}

setTimeout(()=>{
index=(index+1)%data.length
nextQuestion()
},700)

}

quizOptions.appendChild(btn)

})

}

</script>

</body>
</html>
