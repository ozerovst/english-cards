<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pattern Master</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:#020617;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:16px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
font-size:18px;
margin:0;
}

#progress{
font-size:12px;
color:#60a5fa;
}

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:420px;
height:320px;
perspective:1000px;
}

.inner{
position:relative;
width:100%;
height:100%;
transition:transform .5s;
transform-style:preserve-3d;
}

.flipped{
transform:rotateY(180deg);
}

.face{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
box-sizing:border-box;
border-radius:20px;
backface-visibility:hidden;
border:1px solid #1e293b;
}

.front{background:#0f172a;font-size:28px;}
.back{background:#2563eb;transform:rotateY(180deg);font-size:22px;}

footer{
padding:16px;
border-top:1px solid #1e293b;
display:flex;
justify-content:space-between;
}

button{
background:#1e293b;
color:white;
border:none;
padding:14px 18px;
border-radius:10px;
font-size:14px;
}

button.primary{
background:#2563eb;
}

.quiz{
max-width:420px;
width:100%;
display:flex;
flex-direction:column;
gap:10px;
}

.option{
padding:14px;
background:#0f172a;
border:1px solid #1e293b;
border-radius:10px;
}

.correct{background:#16a34a}
.wrong{background:#dc2626}

</style>
</head>

<body>

<header>
<h1>Pattern Master</h1>
<div id="progress"></div>
</header>

<main>

<div id="cardsView" class="card">
<div id="cardInner" class="inner">
<div class="face front" id="front"></div>
<div class="face back" id="back"></div>
</div>
</div>

<div id="quizView" class="quiz" style="display:none">
<div id="quizQuestion" class="face front" style="height:auto"></div>
<div id="options"></div>
</div>

</main>

<footer>
<button id="prev">Prev</button>
<button id="flip" class="primary">Flip</button>
<button id="next">Next</button>
<button id="mode">Quiz</button>
</footer>

<script>

const phrases=[

{en:"I search for good restaurants.",ru:"Я ищу хорошие рестораны."},
{en:"I look for a good cafe.",ru:"Я ищу хорошее кафе."},
{en:"It depends on the weather.",ru:"Это зависит от погоды."},
{en:"I have forgotten my passport.",ru:"Я забыл паспорт."},
{en:"I open Google Maps and search for a cafe.",ru:"Я открываю Google Maps и ищу кафе."},

{en:"I look for a quiet place to work.",ru:"Я ищу тихое место для работы."},
{en:"I am looking forward to the trip.",ru:"Я жду поездку."},
{en:"I am waiting for the taxi.",ru:"Я жду такси."},
{en:"I get home late.",ru:"Я прихожу домой поздно."},
{en:"I get used to the weather.",ru:"Я привыкаю к погоде."},

{en:"I have already sent the message.",ru:"Я уже отправил сообщение."},
{en:"I have already booked the hotel.",ru:"Я уже забронировал отель."},

]

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]]
}
return a
}

let data=shuffle([...phrases])
let index=Number(localStorage.getItem("cardIndex"))||0

const front=document.getElementById("front")
const back=document.getElementById("back")
const progress=document.getElementById("progress")
const inner=document.getElementById("cardInner")

function renderCard(){
let p=data[index]
front.textContent=p.en
back.textContent=p.ru
progress.textContent=(index+1)+" / "+data.length
inner.classList.remove("flipped")
localStorage.setItem("cardIndex",index)
}

renderCard()

flip.onclick=()=>inner.classList.toggle("flipped")

next.onclick=()=>{
index=(index+1)%data.length
renderCard()
}

prev.onclick=()=>{
index=(index-1+data.length)%data.length
renderCard()
}

let quiz=false

mode.onclick=()=>{
quiz=!quiz

if(quiz){
mode.textContent="Cards"
document.getElementById("cardsView").style.display="none"
document.getElementById("quizView").style.display="flex"
nextQuestion()
}
else{
mode.textContent="Quiz"
document.getElementById("cardsView").style.display="block"
document.getElementById("quizView").style.display="none"
renderCard()
}
}

function nextQuestion(){

let q=data[index]

quizQuestion.textContent=q.ru

let options=shuffle([
q,
...shuffle(data.filter(p=>p.en!==q.en)).slice(0,3)
])

optionsContainer=document.getElementById("options")
optionsContainer.innerHTML=""

options.forEach(o=>{
let btn=document.createElement("div")
btn.className="option"
btn.textContent=o.en

btn.onclick=()=>{

if(o.en===q.en){
btn.classList.add("correct")
}
else{
btn.classList.add("wrong")
}

setTimeout(()=>{
index=(index+1)%data.length
nextQuestion()
},600)

}

optionsContainer.appendChild(btn)

})

}

</script>

</body>
</html>
