<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pattern Master</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;
background:#020617;
color:#e2e8f0;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:18px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
margin:0;
font-size:18px;
font-weight:700;
}

#progress{
font-size:12px;
color:#60a5fa;
}

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:24px;
}

.card{
width:100%;
max-width:420px;
height:280px;
background:#0f172a;
border-radius:22px;
border:1px solid #1e293b;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;
font-size:24px;
line-height:1.4;
cursor:pointer;
}

footer{
padding:18px;
border-top:1px solid #1e293b;
display:flex;
gap:10px;
}

button{
flex:1;
border:none;
background:#1e293b;
color:#e2e8f0;
padding:14px;
border-radius:12px;
font-size:15px;
}

button.primary{
background:#2563eb;
color:white;
}

.quiz{
display:none;
width:100%;
max-width:420px;
flex-direction:column;
gap:10px;
}

.question{
background:#0f172a;
border:1px solid #1e293b;
border-radius:18px;
padding:22px;
text-align:center;
font-size:20px;
}

.option{
padding:14px;
border:1px solid #1e293b;
border-radius:12px;
background:#0f172a;
}

.correct{
background:#16a34a;
}

.wrong{
background:#dc2626;
}

</style>

</head>

<body>

<header>

<h1>Pattern Master</h1>

<div id="progress"></div>

</header>

<main>

<div id="cardsView" class="card"></div>

<div id="quizView" class="quiz">

<div id="quizQuestion" class="question"></div>

<div id="quizOptions"></div>

</div>

</main>

<footer>

<button id="prev">Prev</button>
<button id="flip" class="primary">Flip</button>
<button id="next">Next</button>
<button id="mode">Quiz</button>

</footer>

<script>

const phrases=[

{en:"I search for good restaurants.",ru:"Я ищу хорошие рестораны."},
{en:"I search for a good cafe.",ru:"Я ищу хорошее кафе."},
{en:"I search for a hotel.",ru:"Я ищу отель."},
{en:"I look for a quiet place.",ru:"Я ищу тихое место."},
{en:"I look for a taxi.",ru:"Я ищу такси."},
{en:"I look for a pharmacy.",ru:"Я ищу аптеку."},

{en:"It depends on the weather.",ru:"Это зависит от погоды."},
{en:"It depends on the price.",ru:"Это зависит от цены."},
{en:"It depends on the situation.",ru:"Это зависит от ситуации."},
{en:"It depends on the country.",ru:"Это зависит от страны."},

{en:"I have forgotten my passport.",ru:"Я забыл паспорт."},
{en:"I have forgotten the address.",ru:"Я забыл адрес."},
{en:"I have forgotten my password.",ru:"Я забыл пароль."},

{en:"I open Google Maps and search for a cafe.",ru:"Я открываю Google Maps и ищу кафе."},
{en:"I open the app and look for restaurants.",ru:"Я открываю приложение и ищу рестораны."},

{en:"I am looking for my keys.",ru:"Я ищу свои ключи."},
{en:"I am looking for a place to stay.",ru:"Я ищу место где остановиться."},
{en:"I am looking for a restaurant.",ru:"Я ищу ресторан."},

{en:"I am waiting for the taxi.",ru:"Я жду такси."},
{en:"I am waiting for the bus.",ru:"Я жду автобус."},
{en:"I am waiting for the meeting.",ru:"Я жду встречу."},

{en:"I get home late.",ru:"Я прихожу домой поздно."},
{en:"I get home around midnight.",ru:"Я прихожу домой около полуночи."},

{en:"I get used to the weather.",ru:"Я привыкаю к погоде."},
{en:"I get used to the city.",ru:"Я привыкаю к городу."},

{en:"I have already sent the message.",ru:"Я уже отправил сообщение."},
{en:"I have already booked the hotel.",ru:"Я уже забронировал отель."},

{en:"I decide to try this place.",ru:"Я решаю попробовать это место."},
{en:"I decide to change the plan.",ru:"Я решаю изменить план."},

{en:"I plan to visit the museum.",ru:"Я планирую посетить музей."},
{en:"I plan to go to the beach.",ru:"Я планирую пойти на пляж."},

{en:"I try to find a good restaurant.",ru:"Я пытаюсь найти хороший ресторан."},
{en:"I try to understand the problem.",ru:"Я пытаюсь понять проблему."},

{en:"I return to the hotel.",ru:"Я возвращаюсь в отель."},
{en:"I return to the office.",ru:"Я возвращаюсь в офис."}

];

let index=Number(localStorage.getItem("cardIndex"))||0;
let flipped=false;
let quiz=false;

const card=document.getElementById("cardsView");
const progress=document.getElementById("progress");

function renderCard(){

let p=phrases[index];

progress.textContent=(index+1)+" / "+phrases.length;

card.textContent=flipped?p.ru:p.en;

}

renderCard();

document.getElementById("flip").onclick=function(){

flipped=!flipped;
renderCard();

};

document.getElementById("next").onclick=function(){

index=(index+1)%phrases.length;
flipped=false;
localStorage.setItem("cardIndex",index);
renderCard();

};

document.getElementById("prev").onclick=function(){

index=(index-1+phrases.length)%phrases.length;
flipped=false;
localStorage.setItem("cardIndex",index);
renderCard();

};

document.getElementById("mode").onclick=function(){

quiz=!quiz;

if(quiz){

this.textContent="Cards";
card.style.display="none";
document.getElementById("quizView").style.display="flex";
nextQuiz();

}else{

this.textContent="Quiz";
card.style.display="flex";
document.getElementById("quizView").style.display="none";
renderCard();

}

};

function shuffle(a){

for(let i=a.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[a[i],a[j]]=[a[j],a[i]];

}

return a;

}

function nextQuiz(){

let q=phrases[index];

document.getElementById("quizQuestion").textContent=q.ru;

let opts=shuffle([q,...shuffle(phrases.filter(p=>p.en!==q.en)).slice(0,3)]);

let container=document.getElementById("quizOptions");

container.innerHTML="";

opts.forEach(o=>{

let btn=document.createElement("div");

btn.className="option";

btn.textContent=o.en;

btn.onclick=function(){

if(o.en===q.en){

btn.classList.add("correct");

}else{

btn.classList.add("wrong");

}

setTimeout(function(){

index=(index+1)%phrases.length;

nextQuiz();

},700);

};

container.appendChild(btn);

});

}

</script>

</body>
</html>
